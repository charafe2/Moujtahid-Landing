<section class="video-hero" aria-label="Introduction Moujtahid">
  <video
    #introVideo
    class="video-hero__media"
    autoplay
    muted
    playsinline
    preload="auto"
    aria-hidden="true"
    (ended)="onVideoEnded()"
  >
    <source src="assets/videos/7084636-Uhd%203840%202160%2025Fps.mp4" type="video/mp4" />
  </video>

  <div class="video-hero__overlay" aria-hidden="true"></div>

  <div class="video-hero__content">
    <!-- p, not h1: the landing page below owns the single h1 for SEO -->
    <p class="video-hero__title" aria-live="polite">
      {{ titleText }}<span class="video-hero__cursor" [class.video-hero__cursor--hidden]="!showCursor">|</span>
    </p>

    <button
      type="button"
      class="video-hero__cta"
      (click)="onCommence()"
    >
      Commencer
    </button>
  </div>
</section>
